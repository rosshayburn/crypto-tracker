<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CryptoTrack">
<title>CryptoTrack</title>
<style>
  :root {
    --bg:#f5f5f0;--surface:#fff;--surface2:#f2f2ee;
    --border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.14);
    --text:#0f0f0e;--text2:#52514e;--text3:#898781;
    --accent:#2a78d6;--accent-bg:#e6f1fb;
    --success:#0ca30c;--success-bg:#eaf3de;
    --danger:#d03b3b;--danger-bg:#fcebeb;
    --radius:14px;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#111110;--surface:#1a1a19;--surface2:#242422;
    --border:rgba(255,255,255,0.09);--border-strong:rgba(255,255,255,0.16);
    --text:#f5f5f0;--text2:#c3c2b7;--text3:#898781;
    --accent:#3987e5;--accent-bg:#0c2a4a;
    --success:#199e70;--success-bg:#0a2a1e;
    --danger:#e66767;--danger-bg:#2a0f0f;
  }}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto}
  .nav{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:.5px solid var(--border);padding:calc(var(--safe-top) + 12px) 18px 12px}
  .nav-inner{display:flex;align-items:center;justify-content:space-between}
  .nav-left{display:flex;flex-direction:column;gap:2px}
  .nav h1{font-size:17px;font-weight:600;letter-spacing:-.3px}
  .nav-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
  .dot.live{background:var(--success);animation:blink 2.5s infinite}
  .dot.loading{background:var(--accent);animation:blink .7s infinite}
  .dot.error{background:var(--danger)}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .currency-toggle{display:flex;border:.5px solid var(--border-strong);border-radius:20px;overflow:hidden;background:var(--surface2)}
  .cur-btn{padding:5px 12px;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;letter-spacing:.3px;transition:all .15s}
  .cur-btn.active{background:var(--accent);color:#fff;border-radius:20px}
  .tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:.5px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;border:none;background:transparent;color:var(--text3);font-size:10px;cursor:pointer}
  .tab.active{color:var(--accent)}
  .tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .page{display:none;padding:14px 14px calc(80px + var(--safe-bottom))}
  .page.active{display:block}
  .ph{background:var(--surface);border-radius:var(--radius);padding:22px 20px 18px;margin-bottom:14px;border:.5px solid var(--border)}
  .ph-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
  .ph-value{font-size:38px;font-weight:700;letter-spacing:-1.5px;line-height:1;margin-bottom:10px}
  .ph-value.dim{color:var(--text3)}
  .ph-sub{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .badge{display:inline-flex;align-items:center;font-size:13px;font-weight:600;padding:4px 10px;border-radius:20px}
  .badge.up{background:var(--success-bg);color:var(--success)}
  .badge.dn{background:var(--danger-bg);color:var(--danger)}
  .badge.na{background:var(--surface2);color:var(--text3)}
  .ph-inv{font-size:13px;color:var(--text3)}
  .err{background:var(--danger-bg);border:.5px solid var(--danger);border-radius:10px;padding:11px 14px;margin-bottom:12px;font-size:13px;color:var(--danger);display:none;line-height:1.5}
  .err.show{display:block}
  .sec{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0 2px}
  .sec-t{font-size:15px;font-weight:600}
  .ex-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:14px}
  .ex-card{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:12px 14px}
  .ex-name{font-size:12px;color:var(--text3);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ex-val{font-size:17px;font-weight:600}
  .asset-list{display:flex;flex-direction:column;gap:2px}
  .asset-row{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px}
  .asset-row.flash-up{animation:fup .6s ease}
  .asset-row.flash-dn{animation:fdn .6s ease}
  @keyframes fup{0%,100%{background:transparent}30%{background:rgba(12,163,12,.12)}}
  @keyframes fdn{0%,100%{background:transparent}30%{background:rgba(208,59,59,.12)}}
  .a-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
  .a-info{flex:1;min-width:0}
  .a-name{font-size:15px;font-weight:500}
  .a-sub{font-size:12px;color:var(--text3);margin-top:2px}
  .a-right{text-align:right;flex-shrink:0}
  .a-val{font-size:15px;font-weight:600}
  .a-chg{font-size:12px;margin-top:1px;font-weight:500}
  .a-chg.up{color:var(--success)}
  .a-chg.dn{color:var(--danger)}
  .skel{background:var(--surface2);border-radius:12px;height:68px;margin-bottom:2px}
  .form-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
  .form-t{font-size:17px;font-weight:600;margin-bottom:18px}
  .type-row{display:flex;gap:8px;margin-bottom:18px}
  .type-btn{flex:1;padding:10px;border-radius:10px;border:.5px solid var(--border-strong);background:transparent;color:var(--text2);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
  .type-btn.active{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--text2);margin-bottom:5px;font-weight:500}
  .field input,.field select{width:100%;padding:12px 14px;border:.5px solid var(--border-strong);border-radius:10px;background:var(--surface2);color:var(--text);font-size:16px;outline:none;-webkit-appearance:none;font-family:inherit}
  .field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(42,120,214,.12)}
  .field-row{display:flex;gap:10px}
  .field-row .field{flex:1}
  .btn-p{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn-p:active{opacity:.82;transform:scale(.98)}
  .btn-g{width:100%;padding:14px;background:transparent;color:var(--text2);border:.5px solid var(--border-strong);border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:8px}
  .pills{display:flex;gap:7px;margin-bottom:12px}
  .pill{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:.5px solid var(--border-strong);background:var(--surface);color:var(--text2);cursor:pointer}
  .pill.active{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
  .tr{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:2px;display:flex;align-items:center;gap:12px}
  .tr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .tr-dot.buy{background:var(--success)}
  .tr-dot.sell{background:var(--danger)}
  .tr-info{flex:1;min-width:0}
  .tr-main{font-size:14px;font-weight:500}
  .tr-meta{font-size:12px;color:var(--text3);margin-top:2px}
  .tr-right{text-align:right;flex-shrink:0}
  .tr-amt{font-size:14px;font-weight:600}
  .tr-date{font-size:12px;color:var(--text3);margin-top:2px}
  .chart-wrap{position:relative;height:200px;margin:12px 0 4px}
  .donut-legend{display:flex;flex-direction:column;gap:8px;margin-top:14px}
  .leg-row{display:flex;align-items:center;gap:9px;font-size:13px}
  .leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .leg-name{flex:1;color:var(--text2)}
  .leg-val{color:var(--text);font-weight:500}
  .leg-pct{color:var(--text3);font-size:12px;min-width:36px;text-align:right}
  .tgt{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:2px}
  .tgt-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .tgt-asset{font-size:15px;font-weight:600}
  .tgt-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--danger-bg);color:var(--danger)}
  .tgt-row{display:flex;justify-content:space-between;font-size:13px;margin-top:5px}
  .tgt-lbl{color:var(--text3)}
  .tgt-val{font-weight:500}
  .tgt-note{font-size:12px;color:var(--text3);margin-top:8px;font-style:italic}
  .prog{height:4px;background:var(--border-strong);border-radius:2px;margin-top:10px;overflow:hidden}
  .prog-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .5s ease}
  .prog-fill.done{background:var(--success)}
  .tgt-foot{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--text3)}

  /* History swipe/action row */
  .tr-wrap{position:relative;overflow:hidden;border-radius:12px;margin-bottom:2px}
  .tr-actions{position:absolute;right:0;top:0;bottom:0;display:flex;align-items:stretch}
  .tr-action-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0 18px;border:none;cursor:pointer;font-size:10px;font-weight:600;font-family:inherit;color:#fff;min-width:64px}
  .tr-action-btn.edit{background:var(--accent)}
  .tr-action-btn.del{background:var(--danger)}
  .tr-action-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .tr{background:var(--surface);border:.5px solid var(--border);border-radius:0;padding:13px 14px;display:flex;align-items:center;gap:12px;position:relative;z-index:1;transition:transform .2s ease;margin-bottom:0}
  .tr-wrap.open .tr{transform:translateX(-128px)}

  /* Modal overlay */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:none;align-items:flex-end;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px calc(24px + var(--safe-bottom));width:100%;max-width:430px;max-height:90vh;overflow-y:auto}
  .modal-title{font-size:17px;font-weight:600;margin-bottom:18px}
  .modal-actions{display:flex;gap:8px;margin-top:4px}
  .modal-actions .btn-p{flex:1}
  .modal-actions .btn-g{flex:1;margin-top:0}

  /* Stat cards for analytics */
  .stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:14px}
  .stat-card{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:14px}
  .stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
  .stat-value{font-size:20px;font-weight:700;letter-spacing:-.5px}
  .stat-sub{font-size:12px;color:var(--text3);margin-top:3px}
  .stat-value.up{color:var(--success)}
  .stat-value.dn{color:var(--danger)}

  /* Monthly bar chart */
  .bar-chart{display:flex;align-items:flex-end;gap:4px;height:80px;margin-top:12px}
  .bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px}
  .bar-fill{width:100%;border-radius:3px 3px 0 0;min-height:3px;background:var(--accent);opacity:.7;transition:height .4s ease}
  .bar-fill.current{opacity:1}
  .bar-lbl{font-size:9px;color:var(--text3)}
  .toast{position:fixed;bottom:calc(80px + var(--safe-bottom) + 12px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:11px 20px;border-radius:24px;font-size:14px;font-weight:500;z-index:200;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-inner">
    <div class="nav-left">
      <h1>CryptoTrack</h1>
      <div class="nav-status">
        <span class="dot loading" id="dot"></span>
        <span id="status">Loading prices...</span>
      </div>
    </div>
    <div class="currency-toggle">
      <button class="cur-btn active" id="btn-gbp" onclick="setCurrency('GBP')">GBP</button>
      <button class="cur-btn"        id="btn-usd" onclick="setCurrency('USD')">USD</button>
    </div>
  </div>
</div>

<div id="page-portfolio" class="page active">
  <div class="err" id="err-banner">Price feed error — check your connection.</div>
  <div class="ph">
    <div class="ph-label">Total portfolio value</div>
    <div class="ph-value dim" id="total-val">Loading...</div>
    <div class="ph-sub">
      <span class="badge na" id="pnl-badge">—</span>
      <span class="ph-inv" id="inv-label"></span>
    </div>
  </div>
  <div class="sec"><span class="sec-t">By exchange</span></div>
  <div class="ex-grid" id="ex-grid"></div>
  <div class="sec"><span class="sec-t">Holdings</span></div>
  <div class="asset-list" id="asset-list">
    <div class="skel"></div>
    <div class="skel" style="opacity:.6"></div>
    <div class="skel" style="opacity:.3"></div>
  </div>
</div>

<div id="page-add" class="page">
  <div class="form-card">
    <div class="form-t">Record a trade</div>
    <div class="type-row" style="flex-wrap:wrap;gap:6px">
      <button class="type-btn active" id="btn-buy"      onclick="setType('buy')"      style="flex:1;min-width:120px">Buy / Deposit</button>
      <button class="type-btn"        id="btn-sell"     onclick="setType('sell')"     style="flex:1;min-width:120px">Sell / Withdraw</button>
      <button class="type-btn"        id="btn-transfer" onclick="setType('transfer')" style="flex:1 1 100%">Transfer between wallets</button>
    </div>

    <div class="field"><label>Date</label><input type="date" id="f-date"></div>

    <!-- Buy/Sell: single exchange -->
    <div id="f-ex-wrap">
      <div class="field">
        <label>Exchange / wallet</label>
        <select id="f-ex"></select>
      </div>
      <div class="field" id="f-ex-cw" style="display:none">
        <label>Exchange / wallet name</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="f-ex-c" placeholder="e.g. Kraken" style="flex:1">
          <button type="button" onclick="addExchange('f-ex')" style="padding:12px 16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit">Add</button>
        </div>
      </div>
    </div>

    <!-- Transfer: from + to wallets -->
    <div id="f-transfer-wrap" style="display:none">
      <div class="field">
        <label>From wallet</label>
        <select id="f-from"></select>
      </div>
      <div class="field" id="f-from-cw" style="display:none">
        <label>Wallet name</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="f-from-c" placeholder="e.g. Ledger" style="flex:1">
          <button type="button" onclick="addExchange('f-from')" style="padding:12px 16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit">Add</button>
        </div>
      </div>
      <div class="field">
        <label>To wallet</label>
        <select id="f-to"></select>
      </div>
      <div class="field" id="f-to-cw" style="display:none">
        <label>Wallet name</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="f-to-c" placeholder="e.g. Tangem" style="flex:1">
          <button type="button" onclick="addExchange('f-to')" style="padding:12px 16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit">Add</button>
        </div>
      </div>
    </div>

    <!-- Asset -->
    <div class="field">
      <label>Asset</label>
      <select id="f-asset"></select>
    </div>
    <div class="field" id="f-asset-cw" style="display:none">
      <label>Asset ticker</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="f-asset-c" placeholder="e.g. LINK" style="flex:1;text-transform:uppercase">
        <button type="button" onclick="addAsset()" style="padding:12px 16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit">Add</button>
      </div>
    </div>

    <!-- Quantity (always shown) -->
    <div class="field">
      <label>Quantity</label>
      <input type="number" id="f-qty" placeholder="e.g. 0.005" inputmode="decimal" step="any" min="0">
    </div>

    <!-- Price paid (buy/sell only, optional) -->
    <div class="field" id="f-price-wrap">
      <label id="f-price-label">Price paid (optional)</label>
      <input type="number" id="f-amt" placeholder="e.g. 250" inputmode="decimal" step="0.01" min="0">
    </div>

    <button class="btn-p" onclick="submitTrade()">Save trade</button>
    <button class="btn-g" onclick="showTab('portfolio')">Cancel</button>
  </div>
</div>

<div id="page-history" class="page">
  <div class="pills" id="filter-pills">
    <div class="pill active" onclick="filterHist('all',this)">All</div>
    <div class="pill"        onclick="filterHist('buy',this)">Buys</div>
    <div class="pill"        onclick="filterHist('sell',this)">Sells</div>
    <div class="pill"        onclick="filterHist('transfer',this)">Transfers</div>
  </div>
  <div id="hist-list"></div>
</div>

<div id="page-analytics" class="page">
  <!-- Key stats -->
  <div class="stat-grid" id="stat-grid"></div>

  <!-- Allocation donut -->
  <div class="ph" style="margin-bottom:14px">
    <div class="ph-label">Allocation</div>
    <div class="chart-wrap"><canvas id="alloc-canvas"></canvas></div>
    <div class="donut-legend" id="alloc-legend"></div>
  </div>

  <!-- Monthly invested bar chart -->
  <div class="ph" style="margin-bottom:14px">
    <div class="ph-label">Monthly investment</div>
    <div class="bar-chart" id="monthly-bars"></div>
  </div>

  <!-- Per-asset P&L breakdown -->
  <div class="sec"><span class="sec-t">Asset P&L</span></div>
  <div id="pnl-list"></div>
</div>


<!-- Edit trade modal -->
<div class="modal-overlay" id="edit-modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Edit trade</div>
    <input type="hidden" id="edit-id">
    <div class="field"><label>Date</label><input type="date" id="edit-date"></div>
    <div class="field"><label>Exchange / wallet</label><select id="edit-ex"></select></div>
    <div class="field" id="edit-ex-cw" style="display:none">
      <label>Exchange name</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="edit-ex-c" placeholder="e.g. Kraken" style="flex:1">
        <button type="button" onclick="addExchange('edit-ex')" style="padding:12px 16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Add</button>
      </div>
    </div>
    <!-- Transfer fields -->
    <div id="edit-transfer-wrap" style="display:none">
      <div class="field"><label>From wallet</label><select id="edit-from"></select></div>
      <div class="field"><label>To wallet</label><select id="edit-to"></select></div>
    </div>
    <div class="field"><label>Asset</label><select id="edit-asset"></select></div>
    <div class="field"><label>Quantity</label><input type="number" id="edit-qty" inputmode="decimal" step="any" min="0"></div>
    <div class="field" id="edit-price-wrap">
      <label id="edit-price-label">Price paid (GBP, optional)</label>
      <input type="number" id="edit-amt" inputmode="decimal" step="0.01" min="0">
    </div>
    <div class="modal-actions">
      <button class="btn-p" onclick="saveEdit()">Save changes</button>
      <button class="btn-g" onclick="document.getElementById('edit-modal').classList.remove('show')">Cancel</button>
    </div>
  </div>
</div>

<!-- Confirm delete modal -->
<div class="modal-overlay" id="del-modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">Delete this trade?</div>
    <p style="font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.5" id="del-desc"></p>
    <input type="hidden" id="del-id">
    <div class="modal-actions">
      <button class="btn-p" style="background:var(--danger)" onclick="confirmDelete()">Delete</button>
      <button class="btn-g" onclick="document.getElementById('del-modal').classList.remove('show')">Cancel</button>
    </div>
  </div>
</div>

  </button>
  <button class="tab" onclick="showTab('add')" id="tab-add">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Add
  </button>

    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>History
  </button>

    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Analytics

<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
var SEED_TRADES = [];

// Holdings are derived from trade history — no hardcoded quantities
// CoinGecko IDs for price lookups, keyed by ticker symbol
var COIN_META = {
  BTC:  {cgId:'bitcoin',          pair:'BTCUSDT'},
  ETH:  {cgId:'ethereum',         pair:'ETHUSDT'},
  SOL:  {cgId:'solana',           pair:'SOLUSDT'},
  XRP:  {cgId:'ripple',           pair:'XRPUSDT'},
  BNB:  {cgId:'binancecoin',      pair:'BNBUSDT'},
  DOT:  {cgId:'polkadot',         pair:'DOTUSDT'},
  DOGE: {cgId:'dogecoin',         pair:'DOGEUSDT'},
  KAVA: {cgId:'kava',             pair:'KAVAUSDT'},
  IMX:  {cgId:'immutable-x',      pair:'IMXUSDT'},
  TRAC: {cgId:'origintrail',      pair:'TRACUSDT'},
  CRO:  {cgId:'crypto-com-chain', pair:'CROUSDT'},
  PIXEL:{cgId:'pixels',           pair:'PIXELUSDT'},
  PENGU:{cgId:'pudgy-penguins',   pair:'PENGUUSDT'},
  AVAX: {cgId:'avalanche-2',      pair:'AVAXUSDT'},
  ADA:  {cgId:'cardano',          pair:'ADAUSDT'},
  USDT: {cgId:'tether',           pair:null},
  USDC: {cgId:'usd-coin',         pair:null},
};

// Derive current holdings from trade history
function calcHoldings(){
  var h={};
  trades.forEach(function(t){
    if(!t.asset)return;
    var sym=t.asset;
    if(!h[sym])h[sym]=0;
    if(t.type==='buy')  h[sym]+=t.qty||0;
    if(t.type==='sell') h[sym]-=t.qty||0;
    // transfers don't change total qty, just move it between exchanges
  });
  // Remove dust / negative balances
  Object.keys(h).forEach(function(sym){if(h[sym]<=0.000001)delete h[sym];});
  return h;
}

var TARGETS = [];  // No hardcoded targets — user will add these in future

var COLORS = {
  BTC:'#f7931a',ETH:'#627eea',SOL:'#9945ff',XRP:'#346aa9',BNB:'#f3ba2f',
  DOT:'#e6007a',DOGE:'#c2a633',KAVA:'#ff433e',IMX:'#17b5e8',TRAC:'#1b75bb',
  CRO:'#002d74',PIXEL:'#8247e5',PENGU:'#5b8dd9',USDT:'#26a17b',DEFAULT:'#888781'
};

// ── State ─────────────────────────────────────────────────────────────────────
var usdPrices  = {};  // {BTC:{usd:60000,chg:2.3}}
var gbpRate    = 0.79; // fallback; overwritten by live rate
var currency   = 'GBP';
var loaded     = false;
var allocChart = null;
var tradeType  = 'buy';
var histFilter = 'all';
var trades     = loadTrades();
var ws         = null;
var wsTimer    = null;

// ── Storage ───────────────────────────────────────────────────────────────────
function loadTrades(){
  try{var s=localStorage.getItem('ct_trades_v4');return s?JSON.parse(s):[];}
  catch(e){return [];}
}
function saveTrades(){try{localStorage.setItem('ct_trades_v4',JSON.stringify(trades));}catch(e){}}
function saveCache(){try{localStorage.setItem('ct_cache_v2',JSON.stringify({p:usdPrices,r:gbpRate,ts:Date.now()}));}catch(e){}}
function loadCache(){
  try{
    var s=localStorage.getItem('ct_cache_v2');if(!s)return false;
    var c=JSON.parse(s);if(Date.now()-c.ts>7200000)return false;
    usdPrices=c.p;gbpRate=c.r||0.79;return true;
  }catch(e){return false;}
}

// ── Format ────────────────────────────────────────────────────────────────────
function toDisplay(usdVal){
  if(isNaN(usdVal)||usdVal===null||usdVal===undefined)return'—';
  var v=currency==='GBP'?usdVal*gbpRate:usdVal;
  var sym=currency==='GBP'?'£':'$';
  var abs=Math.abs(v);
  var dec=abs>=10000?0:abs>=100?2:abs>=1?2:abs>=0.01?4:6;
  return(v<0?'-':'')+sym+abs.toLocaleString('en-GB',{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function toUSD(v){
  if(isNaN(v)||v===null||v===undefined)return'—';
  var abs=Math.abs(v);
  var dec=abs>=1?2:abs>=0.01?4:6;
  return'$'+abs.toLocaleString('en-GB',{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function fNum(n,d){return n.toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:d||4});}
function fPct(n){return(n>=0?'+':'')+n.toFixed(2)+'%';}
function curSym(){return currency==='GBP'?'£':'$';}

// ── Prices: CoinGecko one call for everything ─────────────────────────────────
// Simple, reliable, CORS-friendly. One fetch gets all assets + GBP rate.
// Fetch with a hard timeout — never hangs
function fetchWithTimeout(url, ms){
  return new Promise(function(resolve, reject){
    var timer=setTimeout(function(){ reject(new Error('timeout')); }, ms);
    fetch(url).then(function(r){clearTimeout(timer);resolve(r);}).catch(function(e){clearTimeout(timer);reject(e);});
  });
}

function applyPricesReady(){
  Object.keys(COIN_META).forEach(function(sym){
    if(!COIN_META[sym].pair) usdPrices[sym]={usd:1,chg:0};
  });
  loaded=true;
  saveCache();
  var ts=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  setStatus('live','Updated '+ts);
  document.getElementById('err-banner').classList.remove('show');
  renderAll();
  openWebSocket();
}

function onFetchFailed(err){
  console.warn('All price sources failed:',err);
  Object.keys(COIN_META).forEach(function(sym){
    if(!COIN_META[sym].pair) usdPrices[sym]={usd:1,chg:0};
  });
  loaded=true;
  setStatus('error','No prices — check connection');
  document.getElementById('err-banner').classList.add('show');
  renderAll();
}

function tryBinance(){
  // Fetch each pair individually in parallel — fast, no batch encoding issues
  var syms=Object.keys(COIN_META).filter(function(s){return COIN_META[s].pair;});
  var promises=syms.map(function(s){
    return fetchWithTimeout('https://api.binance.com/api/v3/ticker/24hr?symbol='+COIN_META[s].pair, 6000)
      .then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
  });
  // Also fetch GBP/USD rate
  promises.push(
    fetchWithTimeout('https://api.binance.com/api/v3/ticker/price?symbol=GBPUSDT', 6000)
      .then(function(r){return r.ok?r.json():null;}).catch(function(){return null;})
  );

  return Promise.all(promises).then(function(results){
    var anyLoaded=false;
    // Last result is GBPUSDT
    var gbpResult=results[results.length-1];
    if(gbpResult&&gbpResult.price) gbpRate=1/parseFloat(gbpResult.price);

    syms.forEach(function(sym,i){
      var d=results[i];
      if(!d||!d.lastPrice)return;
      usdPrices[sym]={usd:parseFloat(d.lastPrice),chg:parseFloat(d.priceChangePercent)||0};
      anyLoaded=true;
    });
    if(!anyLoaded) throw new Error('No Binance data');
    return true;
  });
}

function tryCoinGecko(){
  var ids=Object.values(COIN_META)
    .filter(function(m){return m.pair&&m.cgId;})
    .map(function(m){return m.cgId;})
    .filter(function(v,i,a){return a.indexOf(v)===i;});

  return fetchWithTimeout(
    'https://api.coingecko.com/api/v3/simple/price?ids='+ids.join(',')+'&vs_currencies=usd,gbp&include_24hr_change=true',
    8000
  ).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(data){
    var btc=data['bitcoin'];
    if(btc&&btc.usd&&btc.gbp) gbpRate=btc.gbp/btc.usd;
    Object.keys(COIN_META).forEach(function(sym){
      var m=COIN_META[sym];
      if(!m.pair||!m.cgId)return;
      var d=data[m.cgId];
      if(d&&d.usd) usdPrices[sym]={usd:d.usd,chg:d.usd_24h_change||0};
    });
    return true;
  });
}

function fetchAllPrices(){
  setStatus('loading','Fetching prices...');

  // Show cache immediately while fresh fetch runs
  if(loadCache()&&!loaded){
    loaded=true;
    setStatus('loading','Cached · refreshing...');
    renderAll();
  }

  // Try Binance first (fastest, confirmed working), fall back to CoinGecko
  tryBinance()
    .then(function(){ applyPricesReady(); })
    .catch(function(){
      setStatus('loading','Trying backup source...');
      tryCoinGecko()
        .then(function(){ applyPricesReady(); })
        .catch(function(e){ onFetchFailed(e); });
    });
}

// ── WebSocket: Binance for live ticking (layered on top after initial load) ───
function openWebSocket(){
  if(ws&&(ws.readyState===0||ws.readyState===1))return;
  var streams=Object.keys(COIN_META)
    .filter(function(sym){return COIN_META[sym].pair;})
    .map(function(sym){return COIN_META[sym].pair.toLowerCase()+'@miniTicker'});
  streams.push('gbpusdt@miniTicker');
  var url='wss://stream.binance.com:9443/stream?streams='+streams.join('/');
  try{ws=new WebSocket(url);}catch(e){return;}
  ws.onopen=function(){setStatus('live','Live · Binance stream');};
  ws.onmessage=function(e){
    try{
      var msg=JSON.parse(e.data);
      var d=msg.data;if(!d||!d.s)return;
      var price=parseFloat(d.c);
      if(d.s==='GBPUSDT'){gbpRate=1/price;return;}
      var sym=null;
      Object.keys(COIN_META).forEach(function(s){if(COIN_META[s].pair===d.s)sym=s;});
      if(!sym)return;
      var prev=usdPrices[sym];
      var prevUsd=prev?prev.usd:price;
      usdPrices[sym]={usd:price,chg:prev?prev.chg:0};
      renderPortfolio();
      if(Math.abs(price-prevUsd)>0)flashRow(sym,price>prevUsd);
    }catch(ex){}
  };
  ws.onerror=function(){ws.close();};
  ws.onclose=function(){clearTimeout(wsTimer);wsTimer=setTimeout(openWebSocket,5000);};
}

function flashRow(sym,up){
  var el=document.getElementById('row-'+sym);
  if(!el)return;
  el.classList.remove('flash-up','flash-dn');
  void el.offsetWidth;
  el.classList.add(up?'flash-up':'flash-dn');
}

function setStatus(s,t){
  document.getElementById('dot').className='dot '+s;
  document.getElementById('status').textContent=t;
}

// ── Currency ──────────────────────────────────────────────────────────────────
function setCurrency(c){
  currency=c;
  document.getElementById('btn-gbp').classList.toggle('active',c==='GBP');
  document.getElementById('btn-usd').classList.toggle('active',c==='USD');
  updatePriceLabel();
  if(loaded)renderAll();
}

// ── Maths ─────────────────────────────────────────────────────────────────────
function calcPortfolio(){
  var holdings=calcHoldings();
  var totalUSD=0;
  Object.keys(holdings).forEach(function(sym){
    var p=usdPrices[sym];
    totalUSD+=holdings[sym]*(p?p.usd:0);
  });
  var total=currency==='GBP'?totalUSD*gbpRate:totalUSD;
  var buys=trades.filter(function(t){return t.type==='buy';}).reduce(function(s,t){return s+(t.amount||0);},0);
  var sells=trades.filter(function(t){return t.type==='sell';}).reduce(function(s,t){return s+(t.amount||0);},0);
  var investedGBP=buys-sells;
  var invested=currency==='USD'?investedGBP/gbpRate:investedGBP;
  var pnl=total-invested;
  var pct=invested>0?pnl/invested*100:0;
  return{total:total,totalUSD:totalUSD,invested:invested,pnl:pnl,pct:pct};
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll(){
  renderPortfolio();
  if(document.getElementById('page-history').classList.contains('active'))renderHistory();
  if(document.getElementById('page-analytics').classList.contains('active'))renderAnalytics();
}

function renderPortfolio(){
  if(!loaded)return;
  var c=calcPortfolio();
  var holdings=calcHoldings();
  var up=c.pnl>=0;
  var sym=curSym();

  var tv=document.getElementById('total-val');
  tv.textContent=Object.keys(holdings).length===0?'£0.00':toDisplay(c.totalUSD);
  tv.classList.remove('dim');

  var badge=document.getElementById('pnl-badge');
  if(Object.keys(holdings).length===0){
    badge.textContent='Add your first trade';
    badge.className='badge na';
    document.getElementById('inv-label').textContent='';
  } else {
    var pnlUSD=currency==='GBP'?c.pnl/gbpRate:c.pnl;
    badge.textContent=(up?'+':'')+toDisplay(pnlUSD)+' ('+(up?'+':'')+c.pct.toFixed(1)+'%)';
    badge.className='badge '+(up?'up':'dn');
    document.getElementById('inv-label').textContent='invested '+sym+Math.round(Math.abs(c.invested)).toLocaleString('en-GB');
  }

  // Exchange breakdown — derive from trades
  var exMap={};
  trades.forEach(function(t){
    if(!t.asset||!t.exchange)return;
    var p=usdPrices[t.asset];
    if(!p)return;
    // Approximate: allocate current value proportionally by buy qty per exchange
    if(t.type==='buy'){
      if(!exMap[t.exchange])exMap[t.exchange]=0;
      exMap[t.exchange]+=(t.qty||0)*p.usd;
    }
    if(t.type==='sell'){
      if(!exMap[t.exchange])exMap[t.exchange]=0;
      exMap[t.exchange]-=(t.qty||0)*p.usd;
    }
    if(t.type==='transfer'){
      if(!exMap[t.exchange])exMap[t.exchange]=0;
      if(!exMap[t.toExchange])exMap[t.toExchange]=0;
      var val=(t.qty||0)*p.usd;
      exMap[t.exchange]-=val;
      exMap[t.toExchange]+=val;
    }
  });
  var exEntries=Object.entries(exMap).filter(function(e){return e[1]>0.01;}).sort(function(a,b){return b[1]-a[1];});
  var exGrid=document.getElementById('ex-grid');
  if(exEntries.length===0){
    exGrid.innerHTML='<div class="empty" style="padding:16px 0;font-size:13px">No exchange data yet</div>';
  } else {
    exGrid.innerHTML=exEntries.map(function(e){
      var dispVal=currency==='GBP'?e[1]*gbpRate:e[1];
      return'<div class="ex-card"><div class="ex-name">'+e[0]+'</div><div class="ex-val">'+sym+Math.round(dispVal).toLocaleString('en-GB')+'</div></div>';
    }).join('');
  }

  // Asset list
  var assetRows=Object.keys(holdings).map(function(s){
    var p=usdPrices[s];
    return{sym:s,qty:holdings[s],usd:p?p.usd:0,chg:p?p.chg:null,val:holdings[s]*(p?p.usd:0)};
  }).filter(function(a){return a.val>0.001||a.qty>0;}).sort(function(a,b){return b.val-a.val;});

  var al=document.getElementById('asset-list');
  if(assetRows.length===0){
    al.innerHTML='<div class="empty">No holdings yet — add a trade to get started</div>';
    return;
  }
  al.innerHTML=assetRows.map(function(a){
    var col=COLORS[a.sym]||COLORS.DEFAULT;
    var chgEl=a.chg!==null?'<div class="a-chg '+(a.chg>=0?'up':'dn')+'">'+fPct(a.chg)+' 24h</div>':'';
    var qd=a.qty<0.001?fNum(a.qty,6):fNum(a.qty,4);
    return'<div class="asset-row" id="row-'+a.sym+'">'
      +'<div class="a-icon" style="background:'+col+'22;color:'+col+'">'+a.sym.slice(0,3)+'</div>'
      +'<div class="a-info"><div class="a-name">'+a.sym+'</div><div class="a-sub">'+qd+' · '+toUSD(a.usd)+'</div></div>'
      +'<div class="a-right"><div class="a-val">'+toDisplay(a.val)+'</div>'+chgEl+'</div>'
      +'</div>';
  }).join('');
}

function renderHistory(){
  var f=trades.slice().reverse();
  if(histFilter==='buy')f=f.filter(function(t){return t.type==='buy';});
  if(histFilter==='sell')f=f.filter(function(t){return t.type==='sell';});
  if(histFilter==='transfer')f=f.filter(function(t){return t.type==='transfer';});
  if(!f.length){document.getElementById('hist-list').innerHTML='<div class="empty">No trades yet</div>';return;}
  document.getElementById('hist-list').innerHTML=f.map(function(t){
    var isTransfer=t.type==='transfer';
    var isSell=t.type==='sell';
    var dotCol=isTransfer?'var(--accent)':isSell?'var(--danger)':'var(--success)';
    var label=isTransfer?'Transfer':isSell?'Sell':'Buy';
    var exLine=isTransfer?(t.exchange+' → '+(t.toExchange||'?')):t.exchange;
    var amtStr=isTransfer?'':(isSell?'-':'')+'£'+Math.abs(t.amount||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});
    var amtColor=isTransfer?'var(--text3)':isSell?'var(--danger)':'var(--text)';
    return '<div class="tr-wrap" id="wrap-'+t.id+'">'
      +'<div class="tr" onclick="toggleTradeActions(\''+t.id+'\')">'
      +'<div class="tr-dot" style="background:'+dotCol+'"></div>'
      +'<div class="tr-info"><div class="tr-main">'+exLine+(t.asset?' · '+t.asset:'')+'</div>'
      +'<div class="tr-meta">'+label+(t.qty?' · '+fNum(t.qty,4)+' '+t.asset:'')+'</div></div>'
      +'<div class="tr-right"><div class="tr-amt" style="color:'+amtColor+'">'+amtStr+'</div>'
      +'<div class="tr-date">'+t.date+'</div></div>'
      +'</div>'
      +'<div class="tr-actions">'
      +'<button class="tr-action-btn edit" onclick="openEdit(\''+t.id+'\')">'
      +'<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>'
      +'Edit</button>'
      +'<button class="tr-action-btn del" onclick="openDelete(\''+t.id+'\')">'
      +'<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>'
      +'Delete</button>'
      +'</div>'
      +'</div>';
  }).join('');
  initSwipe();
}

var openWrapId=null;
function toggleTradeActions(id){
  var wrap=document.getElementById('wrap-'+id);
  if(!wrap)return;
  var isOpen=wrap.classList.contains('open');
  // close all
  document.querySelectorAll('.tr-wrap.open').forEach(function(w){w.classList.remove('open');});
  if(!isOpen)wrap.classList.add('open');
  openWrapId=isOpen?null:id;
}

function initSwipe(){
  document.querySelectorAll('.tr-wrap').forEach(function(wrap){
    var startX=0,startY=0,dragging=false;
    wrap.addEventListener('touchstart',function(e){
      startX=e.touches[0].clientX;
      startY=e.touches[0].clientY;
      dragging=true;
    },{passive:true});
    wrap.addEventListener('touchend',function(e){
      if(!dragging)return;
      var dx=e.changedTouches[0].clientX-startX;
      var dy=e.changedTouches[0].clientY-startY;
      if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>30){
        var id=wrap.id.replace('wrap-','');
        if(dx<0){
          document.querySelectorAll('.tr-wrap.open').forEach(function(w){w.classList.remove('open');});
          wrap.classList.add('open');
        } else {
          wrap.classList.remove('open');
        }
      }
      dragging=false;
    },{passive:true});
  });
}

function openEdit(id){
  var t=trades.find(function(x){return String(x.id)===String(id);});
  if(!t)return;
  document.querySelectorAll('.tr-wrap.open').forEach(function(w){w.classList.remove('open');});
  document.getElementById('edit-id').value=t.id;
  document.getElementById('edit-date').value=t.date;
  document.getElementById('modal-title').textContent=t.type==='transfer'?'Edit transfer':'Edit trade';

  var isTransfer=t.type==='transfer';
  document.getElementById('edit-ex').parentElement.style.display=isTransfer?'none':'block';
  document.getElementById('edit-transfer-wrap').style.display=isTransfer?'block':'none';
  document.getElementById('edit-price-wrap').style.display=isTransfer?'none':'block';

  populateDropdown('edit-ex', exchanges, t.exchange);
  populateDropdown('edit-from', exchanges, t.exchange);
  populateDropdown('edit-to', exchanges, t.toExchange||'');
  populateDropdown('edit-asset', assets, t.asset);

  document.getElementById('edit-qty').value=t.qty||'';
  document.getElementById('edit-amt').value=t.amount||'';
  document.getElementById('edit-price-label').textContent='Price paid in '+(currency==='GBP'?'GBP (£)':'USD ($)')+' (optional)';

  document.getElementById('edit-modal').classList.add('show');
}

function saveEdit(){
  var id=document.getElementById('edit-id').value;
  var idx=trades.findIndex(function(x){return String(x.id)===String(id);});
  if(idx===-1)return;
  var t=trades[idx];
  t.date=document.getElementById('edit-date').value;
  t.asset=document.getElementById('edit-asset').value;
  t.qty=parseFloat(document.getElementById('edit-qty').value)||0;
  if(t.type==='transfer'){
    t.exchange=document.getElementById('edit-from').value;
    t.toExchange=document.getElementById('edit-to').value;
  } else {
    t.exchange=document.getElementById('edit-ex').value;
    var amt=parseFloat(document.getElementById('edit-amt').value)||0;
    t.amount=currency==='USD'&&amt>0?amt*gbpRate:amt;
  }
  trades[idx]=t;
  saveTrades();
  document.getElementById('edit-modal').classList.remove('show');
  renderHistory();
  renderPortfolio();
  showToast('Trade updated');
}

function openDelete(id){
  var t=trades.find(function(x){return String(x.id)===String(id);});
  if(!t)return;
  document.querySelectorAll('.tr-wrap.open').forEach(function(w){w.classList.remove('open');});
  document.getElementById('del-id').value=t.id;
  var desc=t.type==='transfer'
    ?'Transfer of '+fNum(t.qty,4)+' '+t.asset+' from '+t.exchange+' to '+(t.toExchange||'?')+' on '+t.date
    :(t.type==='sell'?'Sell':'Buy')+' of '+fNum(t.qty||0,4)+' '+t.asset+' on '+t.date+(t.amount?' (£'+Math.abs(t.amount).toFixed(2)+')':'');
  document.getElementById('del-desc').textContent=desc;
  document.getElementById('del-modal').classList.add('show');
}

function confirmDelete(){
  var id=document.getElementById('del-id').value;
  trades=trades.filter(function(x){return String(x.id)!==String(id);});
  saveTrades();
  document.getElementById('del-modal').classList.remove('show');
  renderHistory();
  renderPortfolio();
  showToast('Trade deleted');
}

function closeModal(e){
  if(e.target.classList.contains('modal-overlay'))
    e.target.classList.remove('show');
}

// Wire up edit-ex dropdown
document.getElementById('edit-ex').addEventListener('change',function(){
  document.getElementById('edit-ex-cw').style.display=this.value==='__add'?'block':'none';
});

function renderAnalytics(){
  if(!loaded)return;
  var c=calcPortfolio();
  var holdings=calcHoldings();
  var sym=curSym();

  // ── Key stats ──────────────────────────────────────────────────────────────
  var buyTrades=trades.filter(function(t){return t.type==='buy';});
  var sellTrades=trades.filter(function(t){return t.type==='sell';});
  var totalBought=buyTrades.reduce(function(s,t){return s+(t.amount||0);},0);
  var totalSold=sellTrades.reduce(function(s,t){return s+(t.amount||0);},0);
  var numAssets=Object.keys(holdings).length;
  var numTrades=buyTrades.length+sellTrades.length;
  // Best performer by 24h change
  var bestSym='—',bestChg=null;
  Object.keys(holdings).forEach(function(s){
    var p=usdPrices[s];if(!p)return;
    if(bestChg===null||p.chg>bestChg){bestChg=p.chg;bestSym=s;}
  });
  var worstSym='—',worstChg=null;
  Object.keys(holdings).forEach(function(s){
    var p=usdPrices[s];if(!p)return;
    if(worstChg===null||p.chg<worstChg){worstChg=p.chg;worstSym=s;}
  });

  // Convert invested to display currency
  var investedGBP=totalBought-totalSold;
  var investedDisp=currency==='USD'?investedGBP/gbpRate:investedGBP;
  var totalDisp=c.total;
  var pnlDisp=totalDisp-investedDisp;

  document.getElementById('stat-grid').innerHTML=[
    {label:'Total invested',  val:sym+Math.round(Math.abs(investedDisp)).toLocaleString('en-GB'), sub:numTrades+' trades', cls:''},
    {label:'Current value',   val:sym+Math.round(totalDisp).toLocaleString('en-GB'),              sub:numAssets+' assets', cls:''},
    {label:'Overall P&L',     val:(pnlDisp>=0?'+':'')+sym+Math.abs(pnlDisp).toLocaleString('en-GB',{maximumFractionDigits:0}),
                              sub:(c.pct>=0?'+':'')+c.pct.toFixed(1)+'% return',                  cls:pnlDisp>=0?'up':'dn'},
    {label:'Best 24h',        val:bestSym, sub:bestChg!==null?(bestChg>=0?'+':'')+bestChg.toFixed(2)+'%':'—', cls:'up'},
  ].map(function(s){
    return'<div class="stat-card"><div class="stat-label">'+s.label+'</div>'
      +'<div class="stat-value '+s.cls+'">'+s.val+'</div>'
      +'<div class="stat-sub">'+s.sub+'</div></div>';
  }).join('');

  // ── Allocation donut ───────────────────────────────────────────────────────
  var assetArr=Object.keys(holdings).map(function(s){
    var p=usdPrices[s];
    return{sym:s,val:holdings[s]*(p?p.usd:0)};
  }).filter(function(a){return a.val>0.01;}).sort(function(a,b){return b.val-a.val;});

  if(assetArr.length===0){
    document.getElementById('alloc-legend').innerHTML='<div class="empty">No holdings yet</div>';
    if(allocChart){allocChart.destroy();allocChart=null;}
    document.getElementById('pnl-list').innerHTML='';
    document.getElementById('monthly-bars').innerHTML='';
    return;
  }

  var top=assetArr.slice(0,6);
  var other=assetArr.slice(6).reduce(function(s,a){return s+a.val;},0);
  var labels=top.map(function(a){return a.sym;});
  var data=top.map(function(a){return a.val;});
  var cols=top.map(function(a){return COLORS[a.sym]||COLORS.DEFAULT;});
  if(other>0.01){labels.push('Other');data.push(other);cols.push('#888781');}

  if(allocChart){allocChart.destroy();allocChart=null;}
  allocChart=new Chart(document.getElementById('alloc-canvas').getContext('2d'),{
    type:'doughnut',
    data:{labels:labels,datasets:[{data:data,backgroundColor:cols,borderColor:cols,borderWidth:2,hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'66%',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){
        return ctx.label+': '+toDisplay(ctx.raw)+' ('+(c.totalUSD>0?(ctx.raw/c.totalUSD*100).toFixed(1):0)+'%)';
      }}}}}
  });

  document.getElementById('alloc-legend').innerHTML=labels.map(function(l,i){
    return'<div class="leg-row"><div class="leg-dot" style="background:'+cols[i]+'"></div>'
      +'<span class="leg-name">'+l+'</span><span class="leg-val">'+toDisplay(data[i])+'</span>'
      +'<span class="leg-pct">'+(c.totalUSD>0?(data[i]/c.totalUSD*100).toFixed(1):0)+'%</span></div>';
  }).join('');

  // ── Monthly investment bar chart ───────────────────────────────────────────
  var monthMap={};
  trades.filter(function(t){return t.type==='buy'||t.type==='sell';}).forEach(function(t){
    var key=t.date.slice(0,7); // YYYY-MM
    if(!monthMap[key])monthMap[key]=0;
    monthMap[key]+=(t.type==='buy'?1:-1)*(t.amount||0);
  });
  var monthKeys=Object.keys(monthMap).sort().slice(-8); // last 8 months
  var maxAmt=Math.max.apply(null,monthKeys.map(function(k){return Math.abs(monthMap[k]);}));
  var nowKey=new Date().toISOString().slice(0,7);
  document.getElementById('monthly-bars').innerHTML=monthKeys.map(function(k){
    var amt=monthMap[k];
    var pct=maxAmt>0?Math.abs(amt)/maxAmt*100:0;
    var lbl=k.slice(5); // MM
    var months=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var lblStr=months[parseInt(lbl,10)]||lbl;
    return'<div class="bar-col">'
      +'<div class="bar-fill'+(k===nowKey?' current':'')
      +'" style="height:'+pct+'%;background:'+(amt<0?'var(--danger)':'var(--accent)')+'"></div>'
      +'<div class="bar-lbl">'+lblStr+'</div></div>';
  }).join('');

  // ── Per-asset P&L breakdown ────────────────────────────────────────────────
  // Cost basis per asset from buy trades
  var costBasis={};
  trades.filter(function(t){return t.type==='buy'&&t.asset&&t.qty;}).forEach(function(t){
    if(!costBasis[t.asset])costBasis[t.asset]={cost:0,qty:0};
    costBasis[t.asset].cost+=(t.amount||0);
    costBasis[t.asset].qty+=t.qty;
  });
  trades.filter(function(t){return t.type==='sell'&&t.asset&&t.qty;}).forEach(function(t){
    if(!costBasis[t.asset])return;
    var avgCost=costBasis[t.asset].qty>0?costBasis[t.asset].cost/costBasis[t.asset].qty:0;
    costBasis[t.asset].cost-=avgCost*t.qty;
    costBasis[t.asset].qty-=t.qty;
  });

  var pnlRows=Object.keys(holdings).map(function(s){
    var p=usdPrices[s];
    var currentUSD=holdings[s]*(p?p.usd:0);
    var costGBP=costBasis[s]?costBasis[s].cost:0;
    var costDisp=currency==='USD'?costGBP/gbpRate:costGBP;
    var currentDisp=currency==='GBP'?currentUSD*gbpRate:currentUSD;
    var pnl=currentDisp-costDisp;
    var pct=costDisp>0?pnl/costDisp*100:0;
    return{sym:s,pnl:pnl,pct:pct,currentDisp:currentDisp,costDisp:costDisp};
  }).sort(function(a,b){return b.pnl-a.pnl;});

  document.getElementById('pnl-list').innerHTML=pnlRows.map(function(r){
    var col=COLORS[r.sym]||COLORS.DEFAULT;
    var up=r.pnl>=0;
    return'<div class="asset-row" style="margin-bottom:2px">'
      +'<div class="a-icon" style="background:'+col+'22;color:'+col+'">'+r.sym.slice(0,3)+'</div>'
      +'<div class="a-info"><div class="a-name">'+r.sym+'</div>'
      +'<div class="a-sub">cost '+sym+Math.abs(r.costDisp).toLocaleString('en-GB',{maximumFractionDigits:0})+'</div></div>'
      +'<div class="a-right">'
      +'<div class="a-val '+(up?'up':'dn')+'" style="font-size:14px;color:'+(up?'var(--success)':'var(--danger)')+'">'+( up?'+':'')+sym+Math.abs(r.pnl).toLocaleString('en-GB',{maximumFractionDigits:0})+'</div>'
      +'<div class="a-chg '+(up?'up':'dn')+'">'+(up?'+':'')+r.pct.toFixed(1)+'%</div>'
      +'</div></div>';
  }).join('');
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function showTab(t){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  document.getElementById('page-'+t).classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='history')renderHistory();
  if(t==='analytics')renderAnalytics();
}
function filterHist(f,el){
  histFilter=f;
  document.querySelectorAll('#filter-pills .pill').forEach(function(p){p.classList.remove('active');});
  el.classList.add('active');
  renderHistory();
}

// ── Add trade ─────────────────────────────────────────────────────────────────
function setType(t){
  tradeType=t;
  document.getElementById('btn-buy').classList.toggle('active',t==='buy');
  document.getElementById('btn-sell').classList.toggle('active',t==='sell');
}
// ── Exchanges (persisted, user-extensible) ────────────────────────────────────
var DEFAULT_EXCHANGES = [
  'Coinbase','Binance','Crypto.com','Bybit','Revolut','Tangem',
  'Uniswap','Metamask','Radix','Solflare','Phantom','Pionex'
];
var DEFAULT_ASSETS = ['BTC','ETH','SOL','XRP','USDT','USDC'];

function loadExchanges(){
  try{var s=localStorage.getItem('ct_exchanges_v1');return s?JSON.parse(s):DEFAULT_EXCHANGES.slice();}
  catch(e){return DEFAULT_EXCHANGES.slice();}
}
function saveExchanges(){
  try{localStorage.setItem('ct_exchanges_v1',JSON.stringify(exchanges));}catch(e){}
}
function loadAssets(){
  try{var s=localStorage.getItem('ct_assets_v1');return s?JSON.parse(s):DEFAULT_ASSETS.slice();}
  catch(e){return DEFAULT_ASSETS.slice();}
}
function saveAssets(){
  try{localStorage.setItem('ct_assets_v1',JSON.stringify(assets));}catch(e){}
}

function populateDropdown(selectId, items, selectedVal){
  var sel=document.getElementById(selectId);
  if(!sel)return;
  sel.innerHTML='<option value="">Select...</option>';
  items.forEach(function(item){
    var opt=document.createElement('option');
    opt.value=item;opt.textContent=item;
    if(item===selectedVal)opt.selected=true;
    sel.appendChild(opt);
  });
  var add=document.createElement('option');
  add.value='__add';
  add.textContent=selectId.startsWith('f-asset')?'+ Add asset':'+ Add exchange / wallet';
  sel.appendChild(add);
}

function populateExchangeDropdown(selectedVal){
  populateDropdown('f-ex', exchanges, selectedVal);
  populateDropdown('f-from', exchanges, selectedVal);
  populateDropdown('f-to', exchanges, selectedVal);
}
function populateAssetDropdown(selectedVal){
  populateDropdown('f-asset', assets, selectedVal);
}

function addExchange(sourceSelectId){
  // find the paired custom input
  var inputId = sourceSelectId+'-c';
  var wrapId  = sourceSelectId+'-cw';
  var val=document.getElementById(inputId).value.trim();
  if(!val){document.getElementById(inputId).focus();return;}
  if(exchanges.indexOf(val)===-1){exchanges.push(val);saveExchanges();}
  populateExchangeDropdown(val);
  // set the triggering select to the new value
  document.getElementById(sourceSelectId).value=val;
  document.getElementById(wrapId).style.display='none';
  document.getElementById(inputId).value='';
}

function addAsset(){
  var val=document.getElementById('f-asset-c').value.trim().toUpperCase();
  if(!val){document.getElementById('f-asset-c').focus();return;}
  if(assets.indexOf(val)===-1){assets.push(val);saveAssets();}
  populateAssetDropdown(val);
  document.getElementById('f-asset').value=val;
  document.getElementById('f-asset-cw').style.display='none';
  document.getElementById('f-asset-c').value='';
}

var exchanges=loadExchanges();
var assets=loadAssets();
populateExchangeDropdown();
populateAssetDropdown();

// Wire up exchange dropdowns
['f-ex','f-from','f-to'].forEach(function(id){
  var el=document.getElementById(id);
  if(!el)return;
  el.addEventListener('change',function(){
    var wrapId=id+'-cw';
    var wrap=document.getElementById(wrapId);
    if(wrap){
      wrap.style.display=this.value==='__add'?'block':'none';
      if(this.value==='__add') setTimeout(function(){document.getElementById(id+'-c').focus();},50);
    }
  });
});

document.getElementById('f-asset').addEventListener('change',function(){
  document.getElementById('f-asset-cw').style.display=this.value==='__add'?'block':'none';
  if(this.value==='__add') setTimeout(function(){document.getElementById('f-asset-c').focus();},50);
});

function updatePriceLabel(){
  var lbl=document.getElementById('f-price-label');
  if(lbl) lbl.textContent='Price paid in '+(currency==='GBP'?'GBP (£)':'USD ($)')+' (optional)';
}

function setType(t){
  tradeType=t;
  document.getElementById('btn-buy').classList.toggle('active',t==='buy');
  document.getElementById('btn-sell').classList.toggle('active',t==='sell');
  document.getElementById('btn-transfer').classList.toggle('active',t==='transfer');
  // Show/hide sections
  var isTransfer=t==='transfer';
  document.getElementById('f-ex-wrap').style.display=isTransfer?'none':'block';
  document.getElementById('f-transfer-wrap').style.display=isTransfer?'block':'none';
  document.getElementById('f-price-wrap').style.display=isTransfer?'none':'block';
  updatePriceLabel();
}

function submitTrade(){
  var date=document.getElementById('f-date').value;
  if(!date){showToast('Please enter a date');return;}

  var asset=document.getElementById('f-asset').value;
  if(!asset||asset==='__add'){showToast('Please select an asset');return;}

  var qty=parseFloat(document.getElementById('f-qty').value);
  if(!qty||qty<=0){showToast('Please enter a quantity');return;}

  if(tradeType==='transfer'){
    var from=document.getElementById('f-from').value;
    var to=document.getElementById('f-to').value;
    if(!from||from==='__add'){showToast('Please select the source wallet');return;}
    if(!to||to==='__add'){showToast('Please select the destination wallet');return;}
    if(from===to){showToast('Source and destination must be different');return;}
    trades.push({id:Date.now(),type:'transfer',date:date,exchange:from,toExchange:to,asset:asset,qty:qty,amount:0});
  } else {
    var ex=document.getElementById('f-ex').value;
    if(!ex||ex==='__add'){showToast('Please select an exchange');return;}
    var amt=parseFloat(document.getElementById('f-amt').value)||0;
    // Convert price to GBP for storage (always store in GBP)
    var amtGBP=amt;
    if(currency==='USD'&&amt>0) amtGBP=amt*gbpRate;
    trades.push({id:Date.now(),type:tradeType,date:date,exchange:ex,asset:asset,qty:qty,amount:amtGBP});
  }

  saveTrades();
  // Reset form
  ['f-ex','f-from','f-to','f-asset','f-amt','f-qty'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.value='';
  });
  ['f-ex-cw','f-from-cw','f-to-cw','f-asset-cw'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.style.display='none';
  });
  populateExchangeDropdown();
  populateAssetDropdown();
  showToast('Saved');
  setTimeout(function(){showTab('history');},500);
}

function showToast(m){
  var el=document.getElementById('toast');
  el.textContent=m;el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2400);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
document.getElementById('f-date').value=new Date().toISOString().split('T')[0];

fetchAllPrices();

document.addEventListener('visibilitychange',function(){
  if(!document.hidden) fetchAllPrices();
});
</script>
